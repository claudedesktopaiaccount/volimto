  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"font":"DM Sans","bg":"#f8f5f0","density":"normal"}/*EDITMODE-END*/;
    function applyTweaks() {
      const font = document.getElementById('tweak-font')?.value || TWEAK_DEFAULTS.font;
      const bg = document.getElementById('tweak-bg')?.value || TWEAK_DEFAULTS.bg;
      document.body.style.fontFamily = "'" + font + "', sans-serif";
      document.body.style.background = bg;
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { font, bg } }, '*');
    }
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');
      else if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  </script>

  // Mini parliament arc

  const total = 150;
  const rows = [15, 22, 28, 35, 50];
  const dots = [];
  let seatList = [];
  parties.forEach(p => { for (let i = 0; i < p.seats; i++) seatList.push(p.color); });
  let idx = 0;
  rows.forEach((count, ri) => {
    const r = 38 + ri * 12;
    for (let i = 0; i < count && idx < seatList.length; i++, idx++) {
      const angle = Math.PI * (i / (count - 1));
      const x = 75 - r * Math.cos(angle);
      const y = 68 - r * Math.sin(angle);
      dots.push({ x, y, color: seatList[idx] });
    }
  });

// Prieskumy page with Chart.js line chart

const { useState: useStateP, useEffect: useEffectP, useRef: useRefP } = React;

function Prieskumy() {
  const [activeAgencies, setActiveAgencies] = useState(['NMS', 'Focus', 'AKO', 'Ipsos']);
  const [period, setPeriod] = useState('1rok');
  const [tab, setTab] = useState('prieskumy');
  const chartRef = useRefP(null);
  const chartInstance = useRefP(null);

  const agencies = ['NMS', 'Focus', 'AKO', 'Ipsos'];
  const periodMap = { '6mesiacov': 5, '1rok': 11, 'vsetko': 11 };
  const sliceFrom = period === '6mesiacov' ? 5 : 0;

  const visibleParties = ['PS', 'SMER', 'REP', 'SLOV', 'SaS', 'HLAS', 'DEM', 'KDH', 'AL', 'SNS'];
  const labels = POLL_LABELS.slice(sliceFrom);

  useEffectP(() => {
    if (!chartRef.current) return;
    if (chartInstance.current) chartInstance.current.destroy();

    const ctx = chartRef.current.getContext('2d');
    const datasets = visibleParties.map(id => {
      const p = PARTIES.find(x => x.id === id);
      const data = POLL_SERIES[id].slice(sliceFrom);
      return {
        label: id,
        data,
        borderColor: p.color,
        backgroundColor: 'transparent',
        borderWidth: ['PS','SMER'].includes(id) ? 2.5 : 1.5,
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0.35,
      };
    });

    chartInstance.current = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#fff',
            borderColor: '#e8e3db',
            borderWidth: 1,
            titleColor: '#1a1a1a',
            bodyColor: '#444',
            padding: 10,
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%`
            }
          },
        },
        scales: {
          x: {
            grid: { display: false },
            border: { display: false },
            ticks: { color: '#aaa', font: { size: 11, family: 'DM Sans' } }
          },
          y: {
            min: 0, max: 28,
            grid: { color: '#f0ede6' },
            border: { display: false, dash: [4,4] },
            ticks: {
              color: '#aaa', font: { size: 11, family: 'DM Sans' },
              callback: v => v + '%'
            }
          }
        }
      }
    });
    return () => chartInstance.current?.destroy();
  }, [period]);

  const toggleAgency = ag => {
    setActiveAgencies(prev =>
      prev.includes(ag) ? prev.filter(a => a !== ag) : [...prev, ag]
    );
  };

  return (

                style={{ accentColor: '#1a1a1a', width: 14, height: 14 }} />
              <span style={{ fontSize: 13, color: '#333' }}>{ag}</span>
            </label>
          ))}
        </div>
        <div style={prieskumyStyles.sideSection}>
          <div style={prieskumyStyles.sideLabel}>ČASOVÉ OBDOBIE</div>

            <button key={val} style={{ ...prieskumyStyles.periodBtn, ...(period === val ? prieskumyStyles.periodActive : {}) }}
              onClick={() => setPeriod(val)}>{label}</button>
          ))}
        </div>
        <button style={prieskumyStyles.exportBtn}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Export CSV
        </button>

        <div style={prieskumyStyles.tabs}>
          {[['prieskumy','Prieskumy'],['model','Model'],['dav','Dav']].map(([id,label]) => (
            <button key={id} style={{ ...prieskumyStyles.tab, ...(tab === id ? prieskumyStyles.tabActive : {}) }}
              onClick={() => setTab(id)}>{label}</button>
          ))}
        </div>

        {/* Chart card */}
        <div style={prieskumyStyles.card}>
          <div style={prieskumyStyles.cardHeader}>

  <script type="text/babel">
// Predikcia volieb page

const { useState: useStateP2, useEffect: useEffectP2 } = React;

function Predikcia() {
  const [adjustments, setAdjustments] = useState({});

  const getAdjusted = (p) => Math.max(0, p.predPct + (adjustments[p.id] || 0));

  // Seat calculation from adjusted pcts
  const calcSeats = () => {
    const eligible = PARTIES.filter(p => getAdjusted(p) >= 5);
    const totalPct = eligible.reduce((s, p) => s + getAdjusted(p), 0);
    const seats = {};
    PARTIES.forEach(p => { seats[p.id] = 0; });
    eligible.forEach(p => { seats[p.id] = Math.round((getAdjusted(p) / totalPct) * 150); });
    // Fix rounding to exactly 150
    const diff = 150 - Object.values(seats).reduce((a,b) => a+b, 0);
    if (diff !== 0) {
      const biggest = eligible.reduce((a,b) => seats[a.id] > seats[b.id] ? a : b);
      seats[biggest.id] += diff;
    }
    return seats;
  };

  const seats = calcSeats();

  // Parliament grid dots
  const seatList = [];
  PARTIES.forEach(p => { for (let i = 0; i < seats[p.id]; i++) seatList.push(p); });

  const rows = [15, 22, 28, 35, 50];
  const dots = [];
  let idx = 0;
  rows.forEach((count, ri) => {
    const r = 42 + ri * 13;
    for (let i = 0; i < count && idx < seatList.length; i++, idx++) {
      const angle = Math.PI * (i / (count - 1));
      const x = 160 - r * Math.cos(angle);
      const y = 120 - r * Math.sin(angle);
      dots.push({ x, y, color: seatList[idx].color, party: seatList[idx].id });
    }
  });

  return (
    <div style={predStyles.wrap}>
      <PageHeader title="Predikcia volieb" subtitle="Monte Carlo simulácia (10 000 iterácií) na základe 12 prieskumov" />

      <div style={predStyles.grid}>
        {/* Left: win probabilities */}
        <div>
          <div style={predStyles.sectionTitle}>Pravdepodobnosť výhry</div>
          <div style={predStyles.probList}>
            {PARTIES.filter(p => p.seats > 0).map(p => {
              const adj = getAdjusted(p);
              return (
                <div key={p.id} style={predStyles.probRow}>
                  <div style={predStyles.probHeader}>
                    <span style={{ fontWeight: 600, fontSize: 14 }}>{p.short}</span>
                    <span style={{ ...predStyles.probPct, color: p.winProb > 0 ? '#1a1a1a' : '#bbb' }}>{p.winProb}%</span>
                  </div>
                  {p.winProb > 0 && (
                    <div style={{ position: 'relative', height: 20, background: '#f0ede6', borderRadius: 4, overflow: 'hidden', marginBottom: 2 }}>
                      <div style={{ position: 'absolute', inset: 0, width: `${p.winProb}%`, background: p.color, borderRadius: 4 }} />
                      <div style={{ position: 'absolute', top: 2, left: 6, fontSize: 11, color: '#fff', fontWeight: 700 }}>{seats[p.id]} mandátov</div>
                    </div>
                  )}
                  {p.winProb === 0 && (
                    <div style={{ height: 20, background: '#f8f5f0', borderRadius: 4, position: 'relative', overflow: 'hidden', marginBottom: 2 }}>
                      <div style={{ position: 'absolute', inset: 0, width: `${(adj / 25) * 100}%`, background: p.color, opacity: 0.25, borderRadius: 4 }} />
                    </div>
                  )}
                  <div style={{ fontSize: 11, color: '#aaa' }}>Odhadované mandáty: {seats[p.id]} · interval {p.interval}%</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Right: parliament arc */}
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <div style={predStyles.sectionTitle}>Rozdelenie kresiel</div>
            <div style={{ fontSize: 12, color: '#aaa' }}>150 mandátov</div>
          </div>
          <div style={{ background: '#fff', border: '1px solid #e8e3db', borderRadius: 10, padding: '16px 8px 8px' }}>
            <svg viewBox="0 0 320 130" style={{ width: '100%', height: 'auto' }}>
              {dots.map((d, i) => (
                <circle key={i} cx={d.x} cy={d.y} r={4} fill={d.color} opacity={0.9}>
                  <title>{d.party}</title>
                </circle>
              ))}
              <line x1="160" y1="10" x2="160" y2="122" stroke="#e8e3db" strokeWidth="1" strokeDasharray="3,3" />
              <text x="160" y="128" textAnchor="middle" fontSize="9" fill="#bbb">76 — väčšina</text>
            </svg>
            {/* Legend */}
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px 10px', padding: '8px 10px 4px', borderTop: '1px solid #f0ede6' }}>
              {PARTIES.filter(p => seats[p.id] > 0).map(p => (
                <span key={p.id} style={{ fontSize: 11, color: '#666', display: 'flex', alignItems: 'center', gap: 4 }}>
                  <span style={{ width: 8, height: 8, background: p.color, borderRadius: 2, display: 'inline-block' }} />
                  {p.short} ({seats[p.id]})
                </span>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Detail table */}
      <div style={{ background: '#fff', border: '1px solid #e8e3db', borderRadius: 10, padding: '20px 22px', marginTop: 28 }}>
        <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 16, display: 'flex', alignItems: 'center', gap: 8 }}>
          Podrobná predikcia
          <span style={{ fontSize: 11, background: '#f0ede6', borderRadius: 10, padding: '2px 8px', color: '#888', fontWeight: 400 }}>?</span>
        </div>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              {['STRANA','PRIEMER','INTERVAL','MANDÁTY','V PARLAMENTE','VÝHRA','ÚPRAVA'].map(h => (
                <th key={h} style={predStyles.th}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {PARTIES.map(p => {
              const adj = adjustments[p.id] || 0;
              const inParl = getAdjusted(p) >= 5;
              const parlPct = inParl ? 100 : Math.round(Math.random() * 30 + 5);
              return (
                <tr key={p.id}>
                  <td style={predStyles.td}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                      <span style={{ width: 10, height: 10, background: p.color, borderRadius: 2, display: 'inline-block' }} />
                      <span style={{ fontSize: 13 }}>{p.name.split('–')[0].trim()}</span>
                    </div>
                  </td>
                  <td style={predStyles.td}>{getAdjusted(p).toFixed(1)}%</td>
                  <td style={predStyles.td}>{p.interval}%</td>
                  <td style={{ ...predStyles.td, fontWeight: 600 }}>{seats[p.id]}</td>
                  <td style={predStyles.td}>
                    <span style={{ fontSize: 11, fontWeight: 600, color: inParl ? '#16a34a' : '#dc2626', background: inParl ? '#dcfce7' : '#fee2e2', padding: '2px 7px', borderRadius: 10 }}>
                      {inParl ? '100%' : `${parlPct}%`}
                    </span>
                  </td>
                  <td style={predStyles.td}>
                    <span style={{ fontSize: 11, color: '#888' }}>{p.winProb}%</span>
                  </td>
                  <td style={predStyles.td}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                      <button style={predStyles.adjBtn} onClick={() => setAdjustments(a => ({...a, [p.id]: (a[p.id]||0) - 0.5}))}>−</button>
                      <span style={{ fontSize: 12, width: 28, textAlign: 'center', color: adj !== 0 ? '#1a1a1a' : '#bbb' }}>{adj > 0 ? `+${adj}` : adj || '0'}</span>
                      <button style={predStyles.adjBtn} onClick={() => setAdjustments(a => ({...a, [p.id]: (a[p.id]||0) + 0.5}))}>+</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {Object.keys(adjustments).length > 0 && (
          <button style={{ background: 'none', border: 'none', color: '#dc2626', fontSize: 12, cursor: 'pointer', marginTop: 10, padding: 0, fontFamily: 'inherit' }}
            onClick={() => setAdjustments({})}>Resetovať úpravy</button>
        )}
      </div>
    </div>
  );
}

const predStyles = {
  wrap: { maxWidth: 1100, margin: '0 auto', padding: '32px 24px 60px' },
  grid: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 28, alignItems: 'start' },
  sectionTitle: { fontSize: 13, fontWeight: 600, color: '#888', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 14 },
  probList: { display: 'flex', flexDirection: 'column', gap: 14 },
  probRow: { background: '#fff', border: '1px solid #e8e3db', borderRadius: 8, padding: '12px 14px' },
  probHeader: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 },
  probPct: { fontSize: 18, fontWeight: 800, letterSpacing: '-0.5px' },
  th: { textAlign: 'left', fontSize: 10, color: '#aaa', letterSpacing: '0.07em', fontWeight: 600, padding: '5px 0 8px', borderBottom: '1px solid #f0ede6' },
  td: { padding: '9px 4px 9px 0', borderBottom: '1px solid #f8f5f0', fontSize: 13, color: '#444', verticalAlign: 'middle' },
  adjBtn: { width: 22, height: 22, background: '#f0ede6', border: 'none', borderRadius: 4, cursor: 'pointer', fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'inherit', color: '#555' },
};

Object.assign(window, { Predikcia });

  </script>

                        </div>
                        <div style={{ height: 7, background: '#f0ede6', borderRadius: 4, overflow: 'hidden' }}>

                        </div>
                      </div>
                    );
                  })}
              </div>
              <div style={{ marginTop: 16, padding: '12px 14px', background: '#f8f5f0', borderRadius: 8, fontSize: 12, color: '#888' }}>
                Predikcia modelu: PS má 91% šancu vyhrať voľby.{' '}
                <span style={{ color: '#1a6eb5', cursor: 'pointer', textDecoration: 'underline' }}>Zobraziť predikciu →</span>
              </div>
            </div>
          ) : (
            <div style={tipStyles.emptyState}>
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style={{ marginBottom: 12 }}>
                <circle cx="24" cy="24" r="20" stroke="#e8e3db" strokeWidth="2"/>
                <path d="M16 28c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#d0cbc3" strokeWidth="2" strokeLinecap="round"/>
                <circle cx="19" cy="21" r="1.5" fill="#d0cbc3"/>
                <circle cx="29" cy="21" r="1.5" fill="#d0cbc3"/>
              </svg>
              <div style={{ fontSize: 15, fontWeight: 600, color: '#888', marginBottom: 6 }}>Hlас ľudu</div>
              <div style={{ fontSize: 13, color: '#bbb', lineHeight: 1.5 }}>Najprv zadajte váš tip — potom uvidíte, čo si myslí zvyšok komunity.</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

  voteBtn: { marginTop: 14, padding: '11px', background: '#f0ede6', borderRadius: 8, textAlign: 'center', fontSize: 14, color: '#bbb', fontWeight: 500 },

  <script type="text/babel">
// Volebný kalkulátor

const { useState: useStateK } = React;

function Kalkulator() {
  const [answers, setAnswers] = useState({});
  const [done, setDone] = useState(false);

  const total = QUIZ_QUESTIONS.length;
  const answered = Object.keys(answers).length;
  const progress = answered / total;
  const current = QUIZ_QUESTIONS[answered] || QUIZ_QUESTIONS[total - 1];

  const handleAnswer = (qId, aIdx) => {
    const next = { ...answers, [qId]: aIdx };
    setAnswers(next);
    if (Object.keys(next).length >= total) {
      setTimeout(() => setDone(true), 300);
    }
  };

  // Score calculation
  const scores = {};
  PARTIES.filter(p => p.seats > 0).forEach(p => { scores[p.id] = 0; });
  Object.entries(answers).forEach(([qId, aIdx]) => {
    const q = QUIZ_QUESTIONS.find(x => x.id === parseInt(qId));
    if (!q) return;
    Object.entries(q.weights).forEach(([pid, wArr]) => {
      if (scores[pid] !== undefined) scores[pid] += (wArr[aIdx] || 0);
    });
  });
  const maxScore = Math.max(...Object.values(scores), 1);
  const sortedParties = Object.entries(scores).sort((a, b) => b[1] - a[1]);

  if (done) {
    return (
      <div style={kalStyles.wrap}>
        <PageHeader title="Koho voliť?" subtitle="Výsledky volebného kalkulátora" />
        <div style={kalStyles.resultsCard}>
          <div style={kalStyles.topMatch}>
            {(() => {
              const [topId] = sortedParties[0];
              const p = PARTIES.find(x => x.id === topId);
              return (
                <div style={{ textAlign: 'center', padding: '32px 24px 28px' }}>
                  <div style={{ fontSize: 11, color: '#aaa', letterSpacing: '0.1em', fontWeight: 600, marginBottom: 12 }}>NAJLEPŠIA ZHODA</div>
                  <div style={{ width: 56, height: 56, background: p.color, borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 18, fontWeight: 800, margin: '0 auto 12px' }}>{p.short}</div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: '#1a1a1a', letterSpacing: '-0.5px' }}>{p.name}</div>
                  <div style={{ fontSize: 14, color: '#aaa', marginTop: 6 }}>Zhoda: {Math.round((scores[topId] / maxScore) * 100)}%</div>
                </div>
              );
            })()}
          </div>
          <div style={{ padding: '0 24px 24px' }}>
            <div style={{ fontSize: 12, color: '#aaa', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 14 }}>VŠETKY STRANY</div>
            {sortedParties.map(([id, score]) => {
              const p = PARTIES.find(x => x.id === id);
              const pct = Math.round((score / maxScore) * 100);
              return (
                <div key={id} style={{ marginBottom: 10 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ width: 10, height: 10, background: p.color, borderRadius: 2, display: 'inline-block' }} />
                      <span style={{ fontSize: 13, color: '#1a1a1a' }}>{p.short}</span>
                      <span style={{ fontSize: 12, color: '#aaa' }}>{p.name.split('–')[0].trim()}</span>
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 600 }}>{pct}%</span>
                  </div>
                  <div style={{ height: 6, background: '#f0ede6', borderRadius: 3 }}>
                    <div style={{ width: `${pct}%`, height: '100%', background: p.color, borderRadius: 3, transition: 'width .5s' }} />
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ padding: '16px 24px 24px', borderTop: '1px solid #f0ede6', display: 'flex', gap: 10 }}>
            <button style={kalStyles.restartBtn} onClick={() => { setAnswers({}); setDone(false); }}>Začať znova</button>
            <div style={{ fontSize: 12, color: '#aaa', alignSelf: 'center' }}>Váhy strán sú redakčné odhady.</div>
          </div>
        </div>
      </div>
    );
  }

  const q = QUIZ_QUESTIONS[answered < total ? answered : total - 1];

  return (
    <div style={kalStyles.wrap}>
      <PageHeader title="Koho voliť?" subtitle={`20 otázok · 2 minúty · váhy strán sú redakčné odhady`} />

      {/* Progress */}
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: '#aaa', marginBottom: 8 }}>
        <span>Otázka {Math.min(answered + 1, total)} z {total}</span>
        <span>{Math.round(progress * 100)}%</span>
      </div>
      <div style={{ height: 3, background: '#f0ede6', borderRadius: 2, marginBottom: 28 }}>
        <div style={{ width: `${progress * 100}%`, height: '100%', background: '#1a1a1a', borderRadius: 2, transition: 'width .3s' }} />
      </div>

      <div style={kalStyles.questionCard}>
        <div style={kalStyles.questionText}>{q.text}</div>
        <div style={kalStyles.answerList}>
          {q.answers.map((ans, i) => {
            const isSelected = answers[q.id] === i;
            return (
              <button key={i}
                style={{
                  ...kalStyles.answerBtn,
                  background: isSelected ? '#1a1a1a' : '#fff',
                  color: isSelected ? '#fff' : '#1a1a1a',
                  borderColor: isSelected ? '#1a1a1a' : '#e8e3db',
                  transform: isSelected ? 'scale(1.01)' : 'scale(1)',
                }}
                onClick={() => handleAnswer(q.id, i)}>
                {ans}
              </button>
            );
          })}
        </div>
      </div>

      {/* Previous answers mini review */}
      {answered > 0 && (
        <div style={{ marginTop: 24 }}>
          <div style={{ fontSize: 11, color: '#bbb', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 10 }}>ZODPOVEDANÉ OTÁZKY</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {QUIZ_QUESTIONS.slice(0, answered).map(q => (
              <div key={q.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: '#fff', border: '1px solid #f0ede6', borderRadius: 8 }}>
                <span style={{ fontSize: 12, color: '#888' }}>{q.text}</span>
                <span style={{ fontSize: 12, color: '#1a1a1a', fontWeight: 500, marginLeft: 16, flexShrink: 0 }}>{q.answers[answers[q.id]]}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const kalStyles = {
  wrap: { maxWidth: 680, margin: '0 auto', padding: '32px 24px 60px' },
  questionCard: { background: '#fff', border: '1px solid #e8e3db', borderRadius: 12, padding: '28px 26px' },
  questionText: { fontSize: 20, fontWeight: 700, color: '#1a1a1a', marginBottom: 22, lineHeight: 1.4, letterSpacing: '-0.3px', textWrap: 'balance' },
  answerList: { display: 'flex', flexDirection: 'column', gap: 10 },
  answerBtn: { padding: '13px 16px', border: '1.5px solid #e8e3db', borderRadius: 9, fontSize: 14, cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left', fontWeight: 500, transition: 'all .15s', lineHeight: 1.4 },
  resultsCard: { background: '#fff', border: '1px solid #e8e3db', borderRadius: 12, overflow: 'hidden' },
  topMatch: { background: '#f8f5f0', borderBottom: '1px solid #e8e3db' },
  restartBtn: { padding: '9px 20px', background: '#1a1a1a', color: '#fff', border: 'none', borderRadius: 7, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', fontWeight: 500 },
};

Object.assign(window, { Kalkulator });

  </script>

  <script type="text/babel">
// Povolebné plány + App router

const { useState: useStatePl } = React;

function Plany() {
  const [activeParty, setActiveParty] = useState('PS');
  const [search, setSearch] = useState('');
  const [expanded, setExpanded] = useState({});

  const plan = PLANS_DATA[activeParty];
  const partyObj = PARTIES.find(p => p.id === activeParty);

  const toggle = (catName) => setExpanded(e => ({ ...e, [catName]: !e[catName] }));

  const filteredCats = plan?.categories.map(cat => ({
    ...cat,
    items: cat.items.filter(item => !search || item.toLowerCase().includes(search.toLowerCase()))
  })).filter(cat => !search || cat.items.length > 0) || [];

  const availableParties = Object.keys(PLANS_DATA);

  return (
    <div style={planyStyles.wrap}>
      <PageHeader title="Povolebné plány" subtitle="Čo sľubujú politické strany pred voľbami!" />

      {/* Party tabs */}
      <div style={planyStyles.tabs}>
        {PARTIES.map(p => {
          const hasData = availableParties.includes(p.id);
          return (
            <button key={p.id}
              style={{
                ...planyStyles.tab,
                background: activeParty === p.id ? p.color : '#fff',
                color: activeParty === p.id ? '#fff' : hasData ? '#555' : '#ccc',
                borderColor: activeParty === p.id ? p.color : '#e8e3db',
                cursor: hasData ? 'pointer' : 'default',
                fontWeight: activeParty === p.id ? 700 : 400,
              }}
              onClick={() => hasData && setActiveParty(p.id)}>
              {p.short}
            </button>
          );
        })}
      </div>

      {/* Search */}
      <div style={planyStyles.searchWrap}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="2" style={{ flexShrink: 0 }}>
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input style={planyStyles.search} placeholder={`Hľadaj v ${plan?.total || '?'} programových bodoch...`}
          value={search} onChange={e => setSearch(e.target.value)} />
      </div>

      {plan ? (
        <div>
          {/* Plan header */}
          <div style={planyStyles.planHeader}>
            <div style={{ width: 4, background: partyObj.color, borderRadius: 2, flexShrink: 0, alignSelf: 'stretch' }} />
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: '#1a1a1a' }}>{plan.title}</div>
              <div style={{ fontSize: 12, color: '#aaa', marginTop: 3 }}>{plan.total} programových bodov</div>
            </div>
          </div>

          {/* Category quick-jumps */}
          <div style={planyStyles.catChips}>
            <button style={planyStyles.catChip} onClick={() => setExpanded({})}>Rozbaliť všetky</button>
            {plan.categories.map(cat => (
              <button key={cat.name} style={planyStyles.catChip} onClick={() => toggle(cat.name)}>
                {cat.name} ({cat.points})
              </button>
            ))}
          </div>

          {/* Categories */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
            {filteredCats.map(cat => (
              <div key={cat.name} style={planyStyles.catBlock}>
                <button style={planyStyles.catHeader} onClick={() => toggle(cat.name)}>
                  <span style={{ fontSize: 15, fontWeight: 600, color: '#1a1a1a' }}>{cat.name}</span>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ fontSize: 12, color: '#aaa' }}>{cat.points} bodov</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="2"
                      style={{ transform: expanded[cat.name] ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform .2s' }}>
                      <path d="M6 9l6 6 6-6"/>
                    </svg>
                  </div>
                </button>

                {expanded[cat.name] && (
                  <div style={planyStyles.catItems}>
                    {cat.items.map((item, i) => (
                      <div key={i} style={planyStyles.item}>
                        <span style={{ width: 20, height: 20, background: partyObj.color, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 10, fontWeight: 700, flexShrink: 0 }}>{i + 1}</span>
                        <span style={{ fontSize: 13, color: '#444', lineHeight: 1.55 }}>{item}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>

          {search && filteredCats.length === 0 && (
            <div style={{ textAlign: 'center', padding: 40, color: '#aaa', fontSize: 14 }}>
              Žiadne výsledky pre „{search}"
            </div>
          )}
        </div>
      ) : (
        <div style={{ textAlign: 'center', padding: 60, color: '#aaa', fontSize: 14 }}>
          Program pre túto stranu zatiaľ nie je k dispozícii.
        </div>
      )}
    </div>
  );
}

const planyStyles = {
  wrap: { maxWidth: 1100, margin: '0 auto', padding: '32px 24px 60px' },
  tabs: { display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 20 },
  tab: { padding: '5px 13px', border: '1px solid #e8e3db', borderRadius: 20, fontSize: 13, fontFamily: 'inherit', transition: 'all .15s', lineHeight: 1.4 },
  searchWrap: { display: 'flex', alignItems: 'center', gap: 10, border: '1px solid #e8e3db', borderRadius: 8, padding: '9px 14px', background: '#fff', marginBottom: 20 },
  search: { flex: 1, border: 'none', outline: 'none', fontSize: 13, color: '#333', fontFamily: 'inherit', background: 'transparent' },
  planHeader: { display: 'flex', gap: 14, alignItems: 'flex-start', padding: '14px 16px', background: '#fff', border: '1px solid #e8e3db', borderRadius: 8, marginBottom: 16 },
  catChips: { display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 16 },
  catChip: { padding: '4px 12px', background: '#f8f5f0', border: '1px solid #e8e3db', borderRadius: 16, fontSize: 12, color: '#666', cursor: 'pointer', fontFamily: 'inherit' },
  catBlock: { background: '#fff', border: '1px solid #e8e3db', borderRadius: 8, overflow: 'hidden', marginBottom: 4 },
  catHeader: { width: '100%', display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 16px', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'inherit', borderBottom: '1px solid transparent' },
  catItems: { padding: '4px 16px 16px', display: 'flex', flexDirection: 'column', gap: 10, borderTop: '1px solid #f0ede6' },
  item: { display: 'flex', gap: 12, alignItems: 'flex-start', paddingTop: 10 },
};

// ─── App Router ───────────────────────────────────────────────────────────────

const { useState: useStateApp } = React;

function App() {
  const [page, setPage] = useState(() => localStorage.getItem('volimto_page') || 'home');

  const navigate = (p) => {
    setPage(p);
    localStorage.setItem('volimto_page', p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const pages = {
    home: <Home setPage={navigate} />,
    prieskumy: <Prieskumy />,
    predikcia: <Predikcia />,
    simulator: <Simulator />,
    tipovanie: <Tipovanie />,
    kalkulator: <Kalkulator />,
    plany: <Plany />,
  };

  return (
    <div style={{ minHeight: '100vh', background: '#f8f5f0', fontFamily: "'DM Sans', sans-serif", paddingBottom: 80 }}>
      <Nav page={page} setPage={navigate} />
      <div style={{ minHeight: 'calc(100vh - 52px)' }}>
        {pages[page] || pages.home}
      </div>
      <Footer setPage={navigate} />
      <CookieBanner />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
